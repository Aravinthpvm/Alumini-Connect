services:
  - type: web
    name: alumni-portal-backend
    runtime: docker
    rootDir: backend
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: alumniportal
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 86400000
      - key: FILE_UPLOAD_DIR
        value: uploads/