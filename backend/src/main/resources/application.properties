# Application Configuration
spring.application.name=alumni-portal-backend

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/alumniportal}
spring.data.mongodb.database=${MONGODB_DATABASE:alumniportal}

# Server Configuration
server.port=${SERVER_PORT:8080}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=${FILE_UPLOAD_DIR:uploads/}

# Logging
logging.level.com.alumniportal=DEBUG
logging.level.org.springframework.security=DEBUG

# CORS is handled in WebConfig
